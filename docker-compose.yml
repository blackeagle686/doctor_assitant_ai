version: '3.8'

services:
  doctor_assist_api:
    build: 
      context: .
      dockerfile: Dockerfile
    container_name: doctor_assist_api
    ports:
      - "3000:3000"
    environment:
      - QDRANT_URL=http://qdrant:6333
      - REDIS_URL=redis://redis:6379/
    env_file:
      - .env
    devices:
      - "/dev/snd:/dev/snd"
    depends_on:
      - qdrant
      - redis
    volumes:
      # Cache huggingface models so they don't re-download every container restart
      - huggingface_cache:/root/.cache/huggingface
      - fastembed_cache:/root/.local/share/fastembed
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant_vdb
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: redis_cache
    volumes:
      - redis_data:/data
    restart: unless-stopped

  ngrok:
    image: ngrok/ngrok:latest
    container_name: ngrok_tunnel
    restart: unless-stopped
    command:
      - "http"
      - "doctor_assist_api:3000"
    environment:
      - NGROK_AUTHTOKEN=${NGROK_AUTHTOKEN}
    depends_on:
      - doctor_assist_api

volumes:
  qdrant_data:
  redis_data:
  huggingface_cache:
  fastembed_cache:
